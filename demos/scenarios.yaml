# ==================== 使用说明 ====================
# 
# 1. 运行单个场景测试：
#    python -m web_agent run --url "https://www.baidu.com/" --task "你的任务描述"
#
# 2. 运行批量评测：
#    python -m web_agent eval --config demos/scenarios.yaml --output artifacts/evaluation
#
# 3. 查看评测结果：
#    - 打开 artifacts/evaluation/summary.json
#    - 查看 artifacts/evaluation/summary.md
#
# 4. 调整重复次数：
#    - 修改上方每个场景的 repeats 字段
#    - 或使用 --repeats 参数统一设置
#
# 5. 自定义成功条件：
#    - url_contains: 最终URL必须包含任意一个关键词
#    - title_contains: 页面标题必须包含任意一个关键词
#    - text_contains: 页面文本必须包含任意一个关键词
